<mat-sidenav-container class="sidenav-container">

  <mat-sidenav #sidenav
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="!isMobile()"
    class="sidenav">

    <div class="sidenav-header">
      <mat-icon class="brand-icon">anchor</mat-icon>
      <div class="brand-text">
        <span class="brand-name">Cantiere Navale</span>
        <span class="brand-subtitle">Gestionale</span>
      </div>
    </div>

    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a mat-list-item
           [routerLink]="item.route"
           routerLinkActive="active-link"
           (click)="isMobile() && sidenav.close()">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <div class="sidenav-footer">
      <small>v1.0.0 &copy; 2025 Cantiere Navale</small>
    </div>

  </mat-sidenav>

  <mat-sidenav-content class="main-content">

    <mat-toolbar class="main-toolbar">
      @if (isMobile()) {
        <button mat-icon-button (click)="toggleSidenav()" aria-label="Apri menu">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="toolbar-title">Cantiere Navale</span>
      <span class="spacer"></span>
      <button mat-icon-button title="Notifiche">
        <mat-icon>notifications</mat-icon>
      </button>
      <button mat-icon-button title="Account">
        <mat-icon>account_circle</mat-icon>
      </button>
    </mat-toolbar>

    <div class="content-area">
      <router-outlet />
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
