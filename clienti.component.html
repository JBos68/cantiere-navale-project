<div class="page-container">
  <div class="page-header">
    <h1 class="page-title"><mat-icon>people</mat-icon> Clienti</h1>
    <button mat-raised-button color="primary" (click)="openNuovoCliente()">
      <mat-icon>add</mat-icon> Nuovo Cliente
    </button>
  </div>
  <mat-card>
    <mat-card-content>
      <div class="table-container">
        <table mat-table [dataSource]="clienti">
          <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef>Nome / Rag. Sociale</th>
            <td mat-cell *matCellDef="let c"><strong>{{ c.nome }} {{ c.cognome }}</strong></td>
          </ng-container>
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let c">{{ c.email }}</td>
          </ng-container>
          <ng-container matColumnDef="telefono">
            <th mat-header-cell *matHeaderCellDef>Telefono</th>
            <td mat-cell *matCellDef="let c">{{ c.telefono }}</td>
          </ng-container>
          <ng-container matColumnDef="nazione">
            <th mat-header-cell *matHeaderCellDef>Nazione / Città</th>
            <td mat-cell *matCellDef="let c">{{ c.nazione }} · {{ c.citta }}</td>
          </ng-container>
          <ng-container matColumnDef="tipoCliente">
            <th mat-header-cell *matHeaderCellDef>Tipo</th>
            <td mat-cell *matCellDef="let c">
              <span class="status-chip" [class]="c.tipoCliente === 'Azienda' ? 'status-completato' : 'status-active'">
                {{ c.tipoCliente }}
              </span>
            </td>
          </ng-container>
          <ng-container matColumnDef="ordini">
            <th mat-header-cell *matHeaderCellDef>Ordini</th>
            <td mat-cell *matCellDef="let c">{{ c.ordini }}</td>
          </ng-container>
          <ng-container matColumnDef="acquistatoDal">
            <th mat-header-cell *matHeaderCellDef>Cliente dal</th>
            <td mat-cell *matCellDef="let c">{{ c.acquistatoDal | date:'dd/MM/yyyy' }}</td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</div>
